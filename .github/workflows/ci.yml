name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress CI runs when a new commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    name: Go Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Just
        uses: extractions/setup-just@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Verify Go module is tidy
        run: just tidy-check

      - name: Verify CLI reference docs are up to date
        run: just docs-check

      - name: Check Go formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ The following files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      # .golangci.yml is v2-schema (`version: "2"`) — v1.x binaries cannot
      # parse it. The version must ALSO be built with a Go ≥ go.mod's target:
      # the action downloads prebuilt binaries, and golangci-lint refuses a
      # repo targeting a newer Go than it was compiled with. v2.4.0 is the
      # first release built with go1.25 (go.mod says 1.25.x).
      # Action @v9 runs on Node 24 (v8 ran on the now-deprecated Node 20, and
      # pulled in a Node-20 actions/github-script transitively); v9 needs
      # golangci-lint ≥ v2.1, satisfied by v2.4.
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # -scan package, not the default symbol scan: the symbol-level SSA
          # call-graph panics on our generic code ("ForEachElement called on type
          # containing *types.TypeParam") — an x/tools SSA type-param substitution
          # bug (golang/go#66783), not a vulnerability. Package-level scan never
          # builds SSA so it can't hit the panic, and still fails CI on any vuln in
          # an imported package (it caught the x/net CVEs the panic was masking).
          $(go env GOPATH)/bin/govulncheck -scan package ./...

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: go
          name: go-coverage
          fail_ci_if_error: false
